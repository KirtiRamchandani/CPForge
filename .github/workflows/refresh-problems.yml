name: Refresh problem feeds

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Refresh Codeforces + LeetCode catalogs
        run: node scripts/refresh-problem-feeds.mjs
      - name: Commit updated feeds if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add datasets/ apps/web-dashboard/public/ packages/sheet-engine/src/generated-problems.json
          git diff --staged --quiet || git commit -m "chore: refresh CF and LeetCode problem feeds"
          git push
